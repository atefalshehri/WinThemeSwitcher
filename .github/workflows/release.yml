name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "") { $version = "dev" }
          New-Item -ItemType Directory -Path staging -Force | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/win-theme-switcher.exe staging/
          Copy-Item README.md staging/
          Copy-Item LICENSE staging/
          $zipName = "win-theme-switcher-$version-windows-x64.zip"
          Compress-Archive -Path staging/* -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            target/x86_64-pc-windows-msvc/release/win-theme-switcher.exe
          body: |
            ## WinThemeSwitcher ${{ github.ref_name }}

            See the [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for install and configuration.

            > 🔏 **Signed with a self-signed certificate** (`CN=WinThemeSwitcher Self-Signed`, since v0.3.0). Import the attached `WinThemeSwitcher-publisher.cer` and verify with `Get-AuthenticodeSignature` — see the README's "Verifying the signature" section. Because the cert isn't CA-issued, SmartScreen and some antivirus products may still warn; the binary is not malicious and the full source is in this repo. If your AV flags it, see the README's "Antivirus false positives" section.

            Download `win-theme-switcher-${{ github.ref_name }}-windows-x64.zip` (includes README + LICENSE) or the bare `win-theme-switcher.exe`.
          draft: false
          prerelease: true
          generate_release_notes: true
